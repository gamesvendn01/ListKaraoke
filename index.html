<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Danh sach bai hat Karaoke ca nhan — tim kiem nhanh, xem lyrics, phat nhac">
  <title>ListKaraoke</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ═══ RESET ═══ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ═══ HEADER ═══ */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-bottom: 2px solid #7c6af7;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 28px; }
    .app-title { font-size: 20px; font-weight: 700; color: #a78bfa; line-height: 1.2; }
    .app-sub { font-size: 12px; color: #94a3b8; }
    .badge {
      background: #7c6af7;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .btn-theme {
      background: #1e1e35;
      border: 1px solid #3d3d6b;
      color: #e2e8f0;
      font-size: 18px;
      width: 36px; height: 36px;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 8px;
    }

    /* ═══ SEARCH BAR ═══ */
    .search-area {
      background: #16162a;
      padding: 14px 16px;
      border-bottom: 1px solid #252550;
    }
    .search-wrap {
      display: flex;
      align-items: center;
      background: #1e1e35;
      border: 2px solid #7c6af7;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .search-icon { padding: 0 12px; font-size: 18px; color: #7c6af7; }
    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 15px;
      font-family: inherit;
      padding: 12px 0;
    }
    .search-input::placeholder { color: #64748b; }
    .btn-clear {
      background: none; border: none;
      color: #94a3b8; font-size: 16px;
      padding: 0 14px; cursor: pointer;
    }

    /* Filter chips row */
    .filter-row {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .filter-select {
      background: #1e1e35;
      border: 1px solid #3d3d6b;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      font-family: inherit;
      padding: 7px 12px;
      cursor: pointer;
      flex: 1; min-width: 120px;
    }
    .filter-select:focus { outline: none; border-color: #7c6af7; }

    /* ═══ SONG LIST ═══ */
    .main-content {
      padding: 12px 12px 100px;
    }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #1e1e35;
      border-top-color: #7c6af7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
    }
    .empty-state .empty-icon { font-size: 48px; display: block; margin-bottom: 12px; }

    /* Song rows */
    .song-list { display: flex; flex-direction: column; gap: 8px; }

    .song-row {
      background: #1e1e35;
      border-radius: 12px;
      border: 1px solid #252550;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .song-row:active { transform: scale(0.98); }
    .song-row:hover { background: #252545; border-color: #7c6af7; }

    .song-num {
      min-width: 28px; height: 28px;
      background: #252550;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      color: #7c6af7;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .song-info { flex: 1; min-width: 0; }

    .song-title {
      font-size: 15px; font-weight: 700;
      color: #e2e8f0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .song-artist {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .song-chips {
      display: flex; flex-wrap: wrap; gap: 5px;
      align-items: center;
    }
    .chip {
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
    }
    .chip-genre { background: rgba(124,106,247,.2); color: #a78bfa; }
    .chip-lang  { background: rgba(34,211,165,.15); color: #22d3a5; }
    .chip-diff  { background: rgba(245,158,11,.15);  color: #f59e0b; }

    .song-badges {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 4px;
      flex-shrink: 0;
    }
    .media-icons { display: flex; gap: 4px; }
    .media-icon {
      background: #252550; border-radius: 6px;
      font-size: 11px; font-weight: 700;
      padding: 2px 7px;
    }
    .media-icon.mp3 { color: #22d3a5; border: 1px solid #22d3a5; }
    .media-icon.mp4 { color: #a78bfa; border: 1px solid #a78bfa; }
    .media-icon.yt  { color: #ef4444; border: 1px solid #ef4444; }
    .rating-str { font-size: 12px; color: #f59e0b; }

    /* highlight search */
    mark {
      background: rgba(245,158,11,.35);
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ═══ MODAL ═══ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      display: flex;
      align-items: flex-end;
    }
    .modal-overlay[hidden] { display: none; }

    .modal {
      background: #1a1a2e;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      border-top: 3px solid #7c6af7;
    }

    .modal-header {
      background: linear-gradient(135deg, #16162a 0%, #1a1a2e 100%);
      padding: 20px 20px 14px;
      position: sticky; top: 0; z-index: 10;
      border-bottom: 1px solid #252550;
    }
    .modal-close-row {
      display: flex; justify-content: flex-end; margin-bottom: 10px;
    }
    .modal-close {
      background: #252550; border: none; border-radius: 50%;
      color: #e2e8f0; font-size: 18px;
      width: 34px; height: 34px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-title {
      font-size: 20px; font-weight: 700; color: #a78bfa;
      margin-bottom: 5px; line-height: 1.3;
    }
    .modal-artist { font-size: 14px; color: #94a3b8; margin-bottom: 10px; }
    .modal-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .modal-tags  { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag-pill {
      background: rgba(124,106,247,.15);
      color: #a78bfa; border: 1px solid rgba(124,106,247,.3);
      font-size: 11px; padding: 2px 8px; border-radius: 20px;
    }

    /* Tab bar — luôn hiện rõ */
    .tab-bar {
      display: flex;
      background: #16162a;
      border-bottom: 2px solid #252550;
      padding: 0 16px;
      position: sticky; top: 0; z-index: 9;
    }
    .tab-btn {
      flex: 1;
      background: none; border: none;
      color: #64748b;
      font-size: 14px; font-weight: 600;
      font-family: inherit;
      padding: 14px 8px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active {
      color: #a78bfa;
      border-bottom-color: #7c6af7;
    }

    /* Tab content */
    .tab-pane { padding: 20px 20px 30px; }
    .tab-pane[hidden] { display: none; }

    /* Lyrics */
    .lyrics-body {
      font-size: 15px; line-height: 2;
      color: #e2e8f0;
      white-space: pre-wrap;
      background: #0f0f1a;
      border-radius: 10px;
      padding: 20px;
    }
    .no-content {
      text-align: center; color: #64748b;
      padding: 40px 20px; font-size: 15px;
    }

    /* Media section */
    .media-section { margin-bottom: 24px; }
    .media-section h3 {
      font-size: 14px; font-weight: 700; color: #a78bfa;
      margin-bottom: 10px;
    }
    .media-section iframe {
      width: 100%; border: none; border-radius: 10px;
      background: #0f0f1a;
    }
    .media-link {
      display: flex; align-items: center; gap: 10px;
      background: #1e1e35; border: 1px solid #3d3d6b;
      border-radius: 10px; padding: 14px 16px;
      color: #e2e8f0; text-decoration: none;
      font-size: 14px; font-weight: 600;
      transition: background 0.15s;
    }
    .media-link:hover { background: #252550; }
    .media-link.yt { border-color: #ef4444; color: #ef4444; }

    /* Info rows */
    .info-row {
      display: flex;
      border-bottom: 1px solid #1e1e35;
      padding: 12px 0;
      align-items: flex-start;
      gap: 12px;
    }
    .info-label {
      font-size: 13px; font-weight: 600; color: #7c6af7;
      min-width: 110px; flex-shrink: 0;
    }
    .info-value {
      font-size: 14px; color: #e2e8f0;
      word-break: break-word;
    }

    /* ═══ SCROLLBAR ═══ */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3d3d6b; border-radius: 3px; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo">🎤</span>
      <div>
        <h1 class="app-title">ListKaraoke</h1>
        <p class="app-sub">Danh sach bai hat ca nhan</p>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn-theme" id="btn-theme" title="Chuyen theme">🌙</button>
      <span class="badge" id="badge-count">0 bai</span>
    </div>
  </header>

  <!-- Search & Filter -->
  <div class="search-area">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="search-input" class="search-input"
             placeholder="Tim ten bai, tac gia, loi bai hat..." autocomplete="off">
      <button class="btn-clear" id="btn-clear">✕</button>
    </div>
    <div class="filter-row">
      <select id="filter-genre" class="filter-select">
        <option value="">Tat ca the loai</option>
      </select>
      <select id="filter-lang" class="filter-select">
        <option value="">Tat ca ngon ngu</option>
      </select>
      <select id="sort-by" class="filter-select">
        <option value="title">A→Z Ten bai</option>
        <option value="artist">A→Z Tac gia</option>
        <option value="rating">Danh gia cao</option>
        <option value="created_at">Moi nhat</option>
      </select>
    </div>
  </div>

  <!-- Content -->
  <main class="main-content">
    <div id="loading" class="loading-state">
      <div class="spinner"></div>
      <p>Dang tai danh sach bai hat...</p>
    </div>
    <div id="empty-state" class="empty-state" hidden>
      <span class="empty-icon">🎵</span>
      <p>Khong tim thay bai hat phu hop</p>
      <small style="color:#64748b">Thu tu khoa khac hoac xoa bo loc</small>
    </div>
    <div id="song-list" class="song-list" hidden></div>
  </main>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal" id="modal-box">
      <!-- Modal Header -->
      <div class="modal-header">
        <div class="modal-close-row">
          <button class="modal-close" id="modal-close">✕</button>
        </div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-artist" id="modal-artist"></div>
        <div class="modal-chips" id="modal-chips"></div>
        <div class="modal-tags" id="modal-tags"></div>
      </div>

      <!-- Tab Bar — Luon hien ro rang -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="lyrics">📝 Lyrics</button>
        <button class="tab-btn" data-tab="media">🎵 Media</button>
        <button class="tab-btn" data-tab="info">ℹ Thong tin</button>
      </div>

      <!-- Tab: Lyrics -->
      <div id="tab-lyrics" class="tab-pane">
        <div id="modal-lyrics"></div>
      </div>

      <!-- Tab: Media -->
      <div id="tab-media" class="tab-pane" hidden>
        <div id="media-container"></div>
      </div>

      <!-- Tab: Info -->
      <div id="tab-info" class="tab-pane" hidden>
        <div id="info-container"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
