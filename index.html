<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ListKaraoke - Tim kiem bai hat</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111827;
      color: #f1f5f9;
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    .hdr {
      background: #1e293b;
      border-bottom: 3px solid #7c3aed;
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .hdr-left { display: flex; align-items: center; gap: 10px; }
    .hdr h1 { font-size: 20px; font-weight: 800; color: #c4b5fd; }
    .hdr p  { font-size: 12px; color: #94a3b8; margin-top: 1px; }
    .hdr-badge {
      background: #7c3aed; color: #fff;
      font-size: 13px; font-weight: 700;
      padding: 5px 14px; border-radius: 20px;
    }

    /* ─── SEARCH ─── */
    .search-box {
      background: #1e293b;
      padding: 14px 16px;
      border-bottom: 1px solid #334155;
    }
    .search-row {
      display: flex; align-items: center;
      background: #0f172a;
      border: 2px solid #7c3aed;
      border-radius: 12px; overflow: hidden;
      margin-bottom: 10px;
    }
    .search-row input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #f1f5f9; font-size: 16px; font-family: inherit;
      padding: 13px 14px;
    }
    .search-row input::placeholder { color: #4b5563; }
    .btn-x {
      background: none; border: none; color: #6b7280;
      font-size: 18px; padding: 0 14px; cursor: pointer;
    }

    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filters select {
      flex: 1; min-width: 110px;
      background: #0f172a; border: 1px solid #374151;
      border-radius: 8px; color: #d1d5db;
      font-size: 13px; font-family: inherit;
      padding: 8px 10px; cursor: pointer;
    }
    .filters select:focus { outline: none; border-color: #7c3aed; }

    /* ─── SONG LIST ─── */
    .content { padding: 10px 12px 80px; }

    .spinner-wrap { text-align: center; padding: 60px 20px; color: #6b7280; }
    .spin {
      width: 38px; height: 38px;
      border: 3px solid #1e293b; border-top-color: #7c3aed;
      border-radius: 50%; animation: sp 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes sp { to { transform: rotate(360deg); } }

    .empty { text-align: center; padding: 60px 20px; color: #6b7280; font-size: 15px; }
    .empty .ei { font-size: 44px; display: block; margin-bottom: 10px; }

    /* Danh sach bai */
    .list { display: flex; flex-direction: column; gap: 8px; }

    .song-row {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      display: flex; align-items: flex-start; gap: 12px;
      transition: border-color .15s, background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .song-row:hover  { background: #263548; border-color: #7c3aed; }
    .song-row:active { background: #2d3f5a; transform: scale(0.99); }

    .sn { /* so thu tu */
      min-width: 30px; height: 30px;
      background: #0f172a; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #7c3aed;
      flex-shrink: 0; margin-top: 1px;
    }
    .si { flex: 1; min-width: 0; }
    .st { /* ten bai */
      font-size: 16px; font-weight: 700; color: #f1f5f9;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .sa { /* tac gia */
      font-size: 13px; color: #94a3b8;
      margin-bottom: 7px;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    .chip {
      font-size: 11px; font-weight: 600;
      padding: 2px 9px; border-radius: 20px;
    }
    .cg { background: rgba(124,58,237,.25); color: #c4b5fd; }
    .cl { background: rgba(16,185,129,.2);  color: #34d399; }

    .sbadge { /* cot phai: mp3/mp4/yt + sao */
      display: flex; flex-direction: column; align-items: flex-end;
      gap: 5px; flex-shrink: 0;
    }
    .micons { display: flex; gap: 4px; }
    .mi {
      font-size: 10px; font-weight: 800;
      padding: 2px 7px; border-radius: 5px;
    }
    .mi.mp3 { background: rgba(16,185,129,.2);  color: #34d399; border: 1px solid #34d399; }
    .mi.mp4 { background: rgba(124,58,237,.2);  color: #c4b5fd; border: 1px solid #c4b5fd; }
    .mi.yt  { background: rgba(239,68,68,.2);   color: #f87171; border: 1px solid #f87171; }
    .stars  { font-size: 12px; color: #fbbf24; }

    mark { background: rgba(251,191,36,.3); color: inherit; border-radius: 2px; }

    /* ─── MODAL ─── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.8);
      z-index: 200;
      display: flex; align-items: flex-end;
    }
    .overlay[hidden] { display: none !important; }

    .modal {
      background: #1e293b;
      border-radius: 20px 20px 0 0;
      border-top: 3px solid #7c3aed;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* Modal header */
    .m-hdr {
      background: #0f172a;
      padding: 16px 18px 14px;
      border-bottom: 1px solid #334155;
      position: sticky; top: 0;
    }
    .m-close-row {
      display: flex; justify-content: flex-end; margin-bottom: 10px;
    }
    .m-close {
      background: #334155; border: none;
      color: #f1f5f9; font-size: 18px;
      width: 34px; height: 34px;
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .m-title  {
      font-size: 19px; font-weight: 800;
      color: #c4b5fd; margin-bottom: 5px; line-height: 1.3;
    }
    .m-artist { font-size: 14px; color: #94a3b8; margin-bottom: 10px; }
    .m-chips  { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .m-tags   { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag-pill {
      background: rgba(124,58,237,.2); color: #c4b5fd;
      border: 1px solid rgba(124,58,237,.4);
      font-size: 11px; padding: 2px 9px; border-radius: 20px;
    }

    /* Tab bar */
    .tabs {
      display: flex;
      background: #0f172a;
      border-bottom: 2px solid #334155;
      flex-shrink: 0;
      position: sticky; top: 0;
    }
    .tab-btn {
      flex: 1;
      background: none; border: none; border-bottom: 3px solid transparent;
      color: #9ca3af;
      font-size: 14px; font-weight: 700; font-family: inherit;
      padding: 14px 8px;
      cursor: pointer;
      margin-bottom: -2px;
      transition: color .15s, border-color .15s;
    }
    .tab-btn.on { color: #c4b5fd; border-bottom-color: #7c3aed; }

    /* Tab content — PHAI CO BACKGROUND VA COLOR RO */
    .tab-pane {
      background: #1e293b;
      color: #f1f5f9;
      padding: 20px 18px 40px;
    }
    .tab-pane[hidden] { display: none !important; }

    /* Lyrics */
    .lyrics-text {
      font-size: 15px; line-height: 2;
      color: #e2e8f0;
      white-space: pre-wrap;
      background: #0f172a;
      border-radius: 10px;
      padding: 20px;
      border-left: 4px solid #7c3aed;
    }
    .no-content {
      text-align: center; color: #6b7280;
      padding: 40px 20px; font-size: 15px;
    }
    .no-content span { font-size: 36px; display: block; margin-bottom: 10px; }

    /* Media */
    .m-sec { margin-bottom: 22px; }
    .m-sec h3 {
      font-size: 14px; font-weight: 700; color: #c4b5fd;
      margin-bottom: 10px;
      padding-bottom: 6px; border-bottom: 1px solid #334155;
    }
    .m-sec iframe {
      width: 100%; border: none; border-radius: 10px;
      background: #0f172a; display: block;
    }
    .open-link {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: #0f172a; border: 2px solid #7c3aed;
      border-radius: 10px; padding: 14px;
      color: #c4b5fd; text-decoration: none;
      font-size: 15px; font-weight: 700;
    }
    .open-link.yt { border-color: #ef4444; color: #f87171; }

    /* Info */
    .info-row {
      display: flex; gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #334155;
      align-items: flex-start;
    }
    .info-lbl {
      font-size: 13px; font-weight: 700; color: #7c3aed;
      min-width: 120px; flex-shrink: 0;
    }
    .info-val {
      font-size: 14px; color: #f1f5f9;
      word-break: break-word;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="hdr">
    <div class="hdr-left">
      <span style="font-size:26px">🎤</span>
      <div>
        <h1>ListKaraoke</h1>
        <p>Danh sach bai hat ca nhan</p>
      </div>
    </div>
    <span class="hdr-badge" id="badge">0 bai</span>
  </header>

  <!-- Search & Filter -->
  <div class="search-box">
    <div class="search-row">
      <span style="padding:0 12px;font-size:18px;color:#7c3aed">🔍</span>
      <input type="search" id="q" placeholder="Tim ten bai, tac gia, loi bai hat..." autocomplete="off">
      <button class="btn-x" id="btnX">✕</button>
    </div>
    <div class="filters">
      <select id="sg"><option value="">Tat ca the loai</option></select>
      <select id="sl"><option value="">Tat ca ngon ngu</option></select>
      <select id="ss">
        <option value="title">A→Z Ten bai</option>
        <option value="artist">A→Z Tac gia</option>
        <option value="rating">Danh gia cao</option>
        <option value="created_at">Moi nhat</option>
      </select>
    </div>
  </div>

  <!-- Main -->
  <div class="content">
    <div id="loading" class="spinner-wrap">
      <div class="spin"></div>
      <p>Dang tai danh sach...</p>
    </div>
    <div id="empty" class="empty" hidden>
      <span class="ei">🎵</span>
      Khong tim thay bai hat phu hop
    </div>
    <div id="list" class="list" hidden></div>
  </div>

  <!-- Modal -->
  <div id="overlay" class="overlay" hidden>
    <div class="modal" id="modal">

      <!-- Modal Header -->
      <div class="m-hdr">
        <div class="m-close-row">
          <button class="m-close" id="closeBtn">✕</button>
        </div>
        <div class="m-title"  id="mTitle"></div>
        <div class="m-artist" id="mArtist"></div>
        <div class="m-chips"  id="mChips"></div>
        <div class="m-tags"   id="mTags"></div>
      </div>

      <!-- Tab Bar -->
      <div class="tabs">
        <button class="tab-btn on" data-tab="lyrics">📝 Lyrics</button>
        <button class="tab-btn"   data-tab="media">🎵 Media</button>
        <button class="tab-btn"   data-tab="info">ℹ Thong tin</button>
      </div>

      <!-- Tab Lyrics -->
      <div id="tab-lyrics" class="tab-pane">
        <div id="lyricsContent"></div>
      </div>

      <!-- Tab Media -->
      <div id="tab-media" class="tab-pane" hidden>
        <div id="mediaContent"></div>
      </div>

      <!-- Tab Info -->
      <div id="tab-info" class="tab-pane" hidden>
        <div id="infoContent"></div>
      </div>

    </div>
  </div>

<script>
'use strict';
let allSongs = [], filtered = [];

// Thu tu URL de thu: goc repo (GitHub Pages) va ../songs.json (local tu web/)
const URLS = ['./songs.json', '../songs.json'];

async function fetchSongs() {
  for (const url of URLS) {
    try {
      const r = await fetch(url + '?t=' + Date.now());
      if (!r.ok) continue;
      const d = await r.json();
      allSongs = Array.isArray(d.songs) ? d.songs : [];
      buildDropdowns();
      render();
      return;
    } catch(e) {}
  }
  document.getElementById('loading').innerHTML =
    '<p style="color:#f87171;font-size:15px">Khong tai duoc songs.json<br>' +
    '<small style="color:#6b7280">Ban da Sync len GitHub chua?</small></p>';
}

function buildDropdowns() {
  const gs = [...new Set(allSongs.map(s=>s.genre).filter(Boolean))].sort();
  const ls = [...new Set(allSongs.map(s=>s.language).filter(Boolean))].sort();
  const sg = document.getElementById('sg');
  const sl = document.getElementById('sl');
  gs.forEach(g => { const o=document.createElement('option'); o.value=g; o.textContent=g; sg.appendChild(o); });
  ls.forEach(l => { const o=document.createElement('option'); o.value=l; o.textContent=l; sl.appendChild(o); });
}

function render() {
  const q  = document.getElementById('q').value.trim().toLowerCase();
  const gv = document.getElementById('sg').value;
  const lv = document.getElementById('sl').value;
  const sv = document.getElementById('ss').value;

  filtered = allSongs.filter(s => {
    if (gv && s.genre    !== gv) return false;
    if (lv && s.language !== lv) return false;
    if (q) {
      const hay = [s.title, s.artist, s.lyrics, s.note, (s.tags||[]).join(' ')].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  filtered.sort((a,b) => {
    if (sv==='rating')     return (b.rating||0)-(a.rating||0);
    if (sv==='created_at') return (b.created_at||'').localeCompare(a.created_at||'');
    if (sv==='artist')     return (a.artist||'').localeCompare(b.artist||'');
    return (a.title||'').localeCompare(b.title||'');
  });

  document.getElementById('badge').textContent = filtered.length + ' / ' + allSongs.length + ' bai';
  document.getElementById('loading').hidden = true;

  const list = document.getElementById('list');
  const empty = document.getElementById('empty');

  if (filtered.length === 0) {
    list.hidden = true; empty.hidden = false; return;
  }
  empty.hidden = true; list.hidden = false;
  list.innerHTML = '';

  filtered.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'song-row';

    const chips = [
      s.genre    ? '<span class="chip cg">'+esc(s.genre)+'</span>' : '',
      s.language ? '<span class="chip cl">'+esc(s.language)+'</span>' : '',
    ].filter(Boolean).join('');

    const micons = [
      s.mp3_gdrive_id ? '<span class="mi mp3">MP3</span>' : '',
      s.mp4_gdrive_id ? '<span class="mi mp4">MP4</span>' : '',
      s.youtube_url   ? '<span class="mi yt">YT</span>'   : '',
    ].filter(Boolean).join('');

    const stars = s.rating > 0 ? '<span class="stars">' + '★'.repeat(s.rating) + '</span>' : '';

    row.innerHTML =
      '<div class="sn">'+(i+1)+'</div>'+
      '<div class="si">'+
        '<div class="st">'+hi(esc(s.title||'(Chua co ten)'), q)+'</div>'+
        '<div class="sa">🎤 '+hi(esc(s.artist||'Chua ro'), q)+'</div>'+
        (chips ? '<div class="chips">'+chips+'</div>' : '')+
      '</div>'+
      '<div class="sbadge">'+
        (micons ? '<div class="micons">'+micons+'</div>' : '')+
        stars+
      '</div>';

    row.onclick = () => openModal(s, q);
    list.appendChild(row);
  });
}

function openModal(s, q) {
  document.getElementById('mTitle').innerHTML  = hi(esc(s.title||''), q);
  document.getElementById('mArtist').textContent =
    '🎤 '+(s.artist||'?')+(s.genre ? ' · '+s.genre : '')+(s.language ? ' · '+s.language : '');

  // Chips
  const rs = s.rating > 0 ? '★'.repeat(s.rating) : '';
  const ds = s.difficulty > 0 ? '!'.repeat(s.difficulty) : '';
  document.getElementById('mChips').innerHTML =
    (s.genre    ? '<span class="chip cg">'+esc(s.genre)+'</span>' : '')+
    (s.language ? '<span class="chip cl">'+esc(s.language)+'</span>' : '')+
    (rs ? '<span class="chip" style="background:rgba(251,191,36,.2);color:#fbbf24">'+rs+'</span>' : '')+
    (ds ? '<span class="chip" style="background:rgba(239,68,68,.2);color:#f87171">Do kho '+ds+'</span>' : '');

  // Tags
  const tags = Array.isArray(s.tags) ? s.tags : [];
  document.getElementById('mTags').innerHTML =
    tags.map(t => '<span class="tag-pill">#'+esc(t)+'</span>').join('');

  // ── LYRICS ──
  const lc = document.getElementById('lyricsContent');
  if (s.lyrics && s.lyrics.trim()) {
    lc.innerHTML = '<div class="lyrics-text">'+hi(esc(s.lyrics), q)+'</div>';
  } else {
    lc.innerHTML = '<div class="no-content"><span>📭</span>Chua co loi bai hat<br><small style="color:#4b5563">Them lyrics trong app desktop roi sync lai</small></div>';
  }

  // ── MEDIA ──
  const mc = document.getElementById('mediaContent');
  mc.innerHTML = '';
  if (s.mp3_gdrive_id) {
    mc.innerHTML += '<div class="m-sec"><h3>🎵 Nhac MP3</h3>'+
      '<iframe src="https://drive.google.com/file/d/'+esc(s.mp3_gdrive_id)+'/preview" height="80" allow="autoplay"></iframe></div>';
  }
  if (s.mp4_gdrive_id) {
    mc.innerHTML += '<div class="m-sec"><h3>🎬 Video Karaoke MP4</h3>'+
      '<iframe src="https://drive.google.com/file/d/'+esc(s.mp4_gdrive_id)+'/preview" height="260" allow="autoplay"></iframe></div>';
  }
  if (s.youtube_url) {
    mc.innerHTML += '<div class="m-sec"><h3>▶ YouTube</h3>'+
      '<a class="open-link yt" href="'+esc(s.youtube_url)+'" target="_blank">▶ Mo tren YouTube</a></div>';
  }
  if (!s.mp3_gdrive_id && !s.mp4_gdrive_id && !s.youtube_url) {
    mc.innerHTML = '<div class="no-content"><span>📭</span>Chua co file media<br><small style="color:#4b5563">Upload MP3/MP4 trong app roi sync</small></div>';
  }

  // ── INFO ──
  document.getElementById('infoContent').innerHTML = [
    ['Ten bai hat', s.title],
    ['Tac gia / Ca si', s.artist],
    ['The loai', s.genre],
    ['Ngon ngu', s.language],
    ['Do kho', s.difficulty > 0 ? '!'.repeat(s.difficulty) : '-'],
    ['Danh gia', s.rating > 0 ? '★'.repeat(s.rating) : 'Chua danh gia'],
    ['Tags', (s.tags||[]).join(', ') || '-'],
    ['File MP3', s.mp3_gdrive_id ? 'Co tren Google Drive' : 'Chua co'],
    ['File MP4', s.mp4_gdrive_id ? 'Co tren Google Drive' : 'Chua co'],
    ['Ghi chu', s.note || '-'],
  ].map(([l,v]) =>
    '<div class="info-row">'+
      '<span class="info-lbl">'+l+'</span>'+
      '<span class="info-val">'+esc(String(v||'-'))+'</span>'+
    '</div>'
  ).join('');

  switchTab('lyrics');
  document.getElementById('overlay').hidden = false;
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').hidden = true;
  document.body.style.overflow = '';
  document.getElementById('mediaContent').innerHTML = '';
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.tab === name);
  });
  ['lyrics','media','info'].forEach(t => {
    document.getElementById('tab-'+t).hidden = (t !== name);
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hi(html, q) {
  if (!q) return html;
  return html.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
}

// Events
document.getElementById('q').addEventListener('input', render);
document.getElementById('btnX').addEventListener('click', () => { document.getElementById('q').value=''; render(); });
document.getElementById('sg').addEventListener('change', render);
document.getElementById('sl').addEventListener('change', render);
document.getElementById('ss').addEventListener('change', render);
document.getElementById('closeBtn').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => { if (e.target.id==='overlay') closeModal(); });
document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

// Start
fetchSongs();
</script>
</body>
</html>
